<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 | 픽셀곰</title>
    <link rel="icon" href="/assets/pixgom-closeup.png" type="image/png">
    <link rel="stylesheet" href="/styles.css?v=20260525-auth-session-gate">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="auth-page auth-checking">
    <main class="auth-shell">
      <a class="brand auth-brand" href="/"><img src="/assets/pixgom-closeup.png" alt=""><span>픽셀곰</span></a>
      <section class="auth-card">
        <p class="section-kicker">Login</p>
        <h1>로그인</h1>
        <p>구매자는 로그인 후 구매자 콘솔에서 자기 방과 연결코드를 확인합니다.</p>
        <div class="start-journey" aria-label="처음 시작 5단계">
          <strong>처음 시작 5단계</strong>
          <ol>
            <li><span>1</span>계정 만들기</li>
            <li><span>2</span>서비스 신청</li>
            <li class="is-active"><span>3</span>운영자 승인</li>
            <li><span>4</span>앱 연결</li>
            <li><span>5</span>첫 명령어 설치</li>
          </ol>
        </div>
        <form data-login-form>
          <label>이메일<input name="email" type="email" autocomplete="email" required placeholder="pixelgom@example.com"></label>
          <label>비밀번호<input name="password" type="password" autocomplete="current-password" required placeholder="비밀번호"></label>
          <button class="button button-primary" type="submit">로그인</button>
          <button class="button kakao-button" type="button" data-kakao-login hidden>카카오로 로그인</button>
        </form>
        <pre class="form-status" data-login-result aria-live="polite">로그인 세션을 확인 중입니다.</pre>
        <div class="auth-links">
          <a href="/signup">회원가입</a>
          <a href="/forgot-password">비밀번호 찾기</a>
          <a href="/apply">서비스 신청</a>
          <a href="/buyer-guide">구매자 가이드</a>
        </div>
      </section>
    </main>
    <script src="/auth.js?v=20260525-auth-session-gate"></script>
    <script>
      const form = document.querySelector("[data-login-form]");
      const result = document.querySelector("[data-login-result]");
      const kakaoButton = document.querySelector("[data-kakao-login]");

      function showLoginForm(message = "회원가입 후 신청 상태를 확인할 수 있습니다.") {
        document.body.classList.remove("auth-checking");
        result.textContent = message;
      }

      async function finishLogin(payload) {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        const json = await response.json();
        if (!response.ok || json.ok === false) throw new Error(json.error || "login_failed");
        if (json.guideToken) sessionStorage.setItem("pixgomBuyerToken", json.guideToken);
        if (json.ownerToken) sessionStorage.setItem("pixgomOwnerToken", json.ownerToken);
        const applications = json.applications.length
          ? json.applications.map((item) => `- ${item.roomName}: ${item.statusLabel} / ${item.payment.statusLabel}`).join("\n")
          : "신청 내역이 없습니다.";
        const buyerRooms = json.buyerRooms?.length
          ? json.buyerRooms.map((room) => [
              `- ${room.roomName}`,
              `  라이선스: ${room.licenseKey || "승인 후 발급"}`,
              `  연결코드: ${room.bridgeConnectCode || "승인 후 발급"}`
            ].join("\n")).join("\n")
          : "";
        const nextAction = json.ownerAccess
          ? "다음 행동: 운영자 어드민으로 이동합니다."
          : json.buyerRooms?.length
            ? "다음 행동: 앱 연결코드 복사 → 설치 안내 확인 → 명령어 스토어에서 첫 팩 설치"
            : json.applications?.length
              ? "다음 행동: 입금/승인 대기 상태를 확인하세요."
              : "다음 행동: 서비스 신청하기";
        result.textContent = [
          "로그인되었습니다.",
          `닉네임: ${json.account.nickname || "미입력"}`,
          `계정: ${json.account.email || json.account.authProvider || "카카오 계정"}`,
          json.ownerAccess ? "운영자 권한: 확인됨" : "운영자 권한: 없음",
          "",
          "신청 내역",
          applications,
          "",
          buyerRooms ? "승인된 방 연결정보" : "",
          buyerRooms,
          "",
          nextAction
        ].join("\n");
        setTimeout(() => {
          window.location.href = json.ownerAccess ? "/admin" : "/console";
        }, 700);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        result.textContent = "로그인 확인 중입니다.";
        const values = Object.fromEntries(new FormData(form).entries());
        try {
          await window.PixelgomAuth.signInWithPassword(values.email, values.password);
          await finishLogin(await window.PixelgomAuth.accessPayload(values));
        } catch (error) {
          result.textContent = `로그인 실패: ${window.PixelgomAuth.friendlyError(error)}`;
        }
      });

      kakaoButton.addEventListener("click", async () => {
        result.textContent = "카카오 로그인으로 이동합니다.";
        try {
          await window.PixelgomAuth.signInWithKakao("/login");
        } catch (error) {
          result.textContent = `카카오 로그인 실패: ${window.PixelgomAuth.friendlyError(error)}`;
        }
      });

      (async () => {
        const cfg = await window.PixelgomAuth.config();
        kakaoButton.hidden = !cfg.auth?.kakaoEnabled;
        const payload = await window.PixelgomAuth.accessPayload({});
        if (payload.accessToken) {
          result.textContent = "로그인 세션을 확인 중입니다.";
          finishLogin(payload).catch((error) => {
            showLoginForm(`카카오 로그인 처리 실패: ${window.PixelgomAuth.friendlyError(error)}`);
          });
          return;
        }
        showLoginForm();
      })();
    </script>
  </body>
</html>
