<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>비밀번호 재설정 | 픽셀곰</title>
    <link rel="icon" href="/assets/pixgom-closeup.png" type="image/png">
    <link rel="stylesheet" href="/styles.css?v=20260525-auth">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <a class="brand auth-brand" href="/"><img src="/assets/pixgom-closeup.png" alt=""><span>픽셀곰</span></a>
      <section class="auth-card">
        <p class="section-kicker">Reset</p>
        <h1>새 비밀번호 설정</h1>
        <p>이메일 재설정 링크로 들어온 뒤 새 비밀번호를 저장합니다.</p>
        <small data-auth-mode>로그인 방식을 확인 중입니다.</small>
        <form data-reset-form>
          <label>새 비밀번호<input name="password" type="password" autocomplete="new-password" required minlength="8" placeholder="8자 이상"></label>
          <label>새 비밀번호 확인<input name="passwordConfirm" type="password" autocomplete="new-password" required minlength="8" placeholder="다시 입력"></label>
          <button class="button button-primary" type="submit">비밀번호 저장</button>
        </form>
        <pre class="form-status" data-reset-result aria-live="polite">새 비밀번호를 입력해 주세요.</pre>
        <div class="auth-links">
          <a href="/login">로그인</a>
          <a href="/forgot-password">재설정 메일 다시 받기</a>
        </div>
      </section>
    </main>
    <script src="/auth.js?v=20260525-auth"></script>
    <script>
      const form = document.querySelector("[data-reset-form]");
      const result = document.querySelector("[data-reset-result]");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const payload = Object.fromEntries(new FormData(form).entries());
        if (payload.password !== payload.passwordConfirm) {
          result.textContent = "비밀번호 재설정 실패: 비밀번호가 일치하지 않습니다.";
          return;
        }
        result.textContent = "새 비밀번호를 저장하는 중입니다.";
        try {
          await window.PixelgomAuth.updatePassword(payload.password);
          result.textContent = "비밀번호가 변경되었습니다. 로그인 화면으로 이동합니다.";
          setTimeout(() => {
            window.location.href = "/login";
          }, 900);
        } catch (error) {
          result.textContent = error.message === "password_reset_requires_supabase"
            ? "비밀번호 재설정은 Supabase 이메일 인증 설정 후 사용할 수 있습니다."
            : `비밀번호 재설정 실패: ${error.message}`;
        }
      });

      (async () => {
        const cfg = await window.PixelgomAuth.config();
        window.PixelgomAuth.showAuthMode(document.querySelector("[data-auth-mode]"), cfg);
      })();
    </script>
  </body>
</html>
