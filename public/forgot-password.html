<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="가입 이메일로 픽셀곰 비밀번호 재설정 안내를 요청하는 비밀번호 찾기 페이지입니다.">
    <title>비밀번호 찾기 | 픽셀곰</title>
    <link rel="icon" href="/assets/pixgom-closeup.png" type="image/png">
    <link rel="stylesheet" href="/styles.css?v=20260525-auth">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <a class="brand auth-brand" href="/"><img src="/assets/pixgom-closeup.png" alt=""><span>픽셀곰</span></a>
      <section class="auth-card">
        <p class="section-kicker">Password</p>
        <h1>비밀번호 찾기</h1>
        <p>가입한 이메일로 비밀번호 재설정 링크를 보냅니다.</p>
        <small data-auth-mode>로그인 방식을 확인 중입니다.</small>
        <form data-forgot-form>
          <label>이메일<input name="email" type="email" autocomplete="email" required placeholder="pixelgom@example.com"></label>
          <button class="button button-primary" type="submit">재설정 메일 보내기</button>
        </form>
        <pre class="form-status" data-forgot-result aria-live="polite">메일함에서 재설정 링크를 확인해 주세요.</pre>
        <div class="auth-links">
          <a href="/login">로그인</a>
          <a href="/signup">회원가입</a>
        </div>
      </section>
    </main>
    <script src="/auth.js?v=20260525-auth"></script>
    <script>
      const form = document.querySelector("[data-forgot-form]");
      const result = document.querySelector("[data-forgot-result]");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const payload = Object.fromEntries(new FormData(form).entries());
        result.textContent = "재설정 메일을 요청하는 중입니다.";
        try {
          await window.PixelgomAuth.resetPasswordForEmail(payload.email);
          result.textContent = [
            "비밀번호 재설정 메일을 보냈습니다.",
            "메일함에서 링크를 열고 새 비밀번호를 설정해 주세요.",
            "메일이 없다면 스팸함을 확인하거나 잠시 뒤 다시 시도해 주세요."
          ].join("\n");
        } catch (error) {
          result.textContent = error.message === "password_reset_requires_supabase"
            ? "비밀번호 찾기는 Supabase 이메일 인증 설정 후 사용할 수 있습니다."
            : `비밀번호 찾기 실패: ${error.message}`;
        }
      });

      (async () => {
        const cfg = await window.PixelgomAuth.config();
        window.PixelgomAuth.showAuthMode(document.querySelector("[data-auth-mode]"), cfg);
      })();
    </script>
  </body>
</html>
