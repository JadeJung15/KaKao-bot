<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>픽셀곰 콘솔</title>
    <link rel="icon" href="/assets/pixgom-closeup.png" type="image/png">
    <link rel="stylesheet" href="/styles.css?v=20260524-commerce3">
  </head>
  <body class="admin-page">
    <header class="site-header" aria-label="관리 콘솔 메뉴">
      <a class="brand" href="/" aria-label="픽셀곰 홈">
        <img src="/assets/pixgom-closeup.png" alt="" aria-hidden="true">
        <span>픽셀곰 콘솔</span>
      </a>
      <nav class="nav-links" aria-label="관리 메뉴">
        <a href="/">홈</a>
        <a href="/health">서버 상태</a>
      </nav>
    </header>

    <main class="admin-main">
      <section class="admin-hero">
        <div>
          <p class="section-kicker">Commercial Ops</p>
          <h1>방별 설정, 구독, 라이선스, 기능 상태를 한 화면에서 관리합니다</h1>
          <p>판매 운영 기준으로 방 등록부터 만료일, 관리자, 기능 ON/OFF, 백업까지 처리합니다.</p>
        </div>
        <img src="/assets/pixgom-guardian.png" alt="픽셀곰 콘솔 이미지">
      </section>

      <section class="admin-toolbar" aria-label="관리 도구">
        <label>
          운영 토큰
          <input data-token type="password" autocomplete="off" placeholder="ADMIN_CONSOLE_TOKEN">
        </label>
        <label class="admin-token-save">
          <input data-save-token type="checkbox">
          이 브라우저에 토큰 저장
        </label>
        <label class="admin-search-field">
          검색
          <input data-admin-search type="search" autocomplete="off" placeholder="방, 관리자, 라이선스, 신청자">
        </label>
        <button class="button button-primary" type="button" data-load-rooms>등록 방 불러오기</button>
        <button class="button button-secondary" type="button" data-load-applications>신청/결제 불러오기</button>
        <button class="button button-secondary" type="button" data-diagnostics>진단 새로고침</button>
        <button class="button button-secondary" type="button" data-backup>백업 JSON 받기</button>
      </section>

      <section class="admin-summary" data-summary>
        <article><strong>-</strong><span>전체 방</span></article>
        <article><strong>-</strong><span>활성 방</span></article>
        <article><strong>-</strong><span>만료 방</span></article>
      </section>

      <section class="admin-grid admin-grid-wide">
        <form class="admin-form" data-admin-form>
          <h2>방 설정 저장</h2>
          <div class="admin-form-grid">
            <label>
              방 이름
              <input name="room" required placeholder="픽셀곰 RPG 놀이터">
            </label>
            <label>
              roomId
              <input name="roomId" placeholder="gu25P5vi">
            </label>
            <label>
              오픈채팅 링크
              <input name="roomLink" placeholder="https://open.kakao.com/o/gu25P5vi">
            </label>
            <label>
              입장확인 문구
              <input name="joinPhrase" placeholder="픽셀곰 입장확인">
            </label>
            <label>
              관리자 닉네임
              <input name="roomAdmins" placeholder="관리자1,관리자2">
            </label>
            <label>
              라이선스 키
              <input name="licenseKey" placeholder="비우면 서버가 생성">
            </label>
            <label>
              월 이용금액
              <input name="monthlyPriceKrw" inputmode="numeric" value="5500">
            </label>
            <label>
              구독 만료일
              <input name="subscriptionExpiresAt" type="date">
            </label>
          </div>

          <fieldset class="feature-fieldset">
            <legend>방별 기능 ON/OFF</legend>
            <label><input type="checkbox" name="feature_attendance" checked> 출석</label>
            <label><input type="checkbox" name="feature_points" checked> 포인트</label>
            <label><input type="checkbox" name="feature_rankings" checked> 랭킹</label>
            <label><input type="checkbox" name="feature_history" checked> 히스토리</label>
            <label><input type="checkbox" name="feature_profiles" checked> 프로필</label>
            <label><input type="checkbox" name="feature_localJs" checked> JS 자동응답</label>
            <label><input type="checkbox" name="feature_games"> 게임</label>
            <label><input type="checkbox" name="feature_customCommands" checked> 커스텀 명령어</label>
          </fieldset>

          <fieldset class="game-fieldset">
            <legend>게임 시즌/보상 설정</legend>
            <label>
              시즌 이름
              <input name="gameSeasonName" placeholder="픽셀곰 시즌 1">
            </label>
            <label>
              주사위 기본 보상
              <input name="gameDiceReward" inputmode="numeric" value="30">
            </label>
            <label>
              낚시 기본 보상
              <input name="gameFishingReward" inputmode="numeric" value="40">
            </label>
            <label>
              탐험 기본 보상
              <input name="gameExploreReward" inputmode="numeric" value="50">
            </label>
          </fieldset>

          <label class="wide-label">
            커스텀 명령어
            <textarea name="customCommands" rows="7" placeholder="/공지=오늘 공지는 여기입니다.&#10;/규칙=두글자 닉네임 뒤에 성별을 붙여주세요."></textarea>
            <small>한 줄에 하나씩 `/명령어=응답내용` 형식으로 입력합니다. 고정 명령어는 등록되지 않습니다.</small>
          </label>
          <div class="command-builder" aria-label="커스텀 명령어 제작">
            <label>
              명령어
              <input data-command-trigger placeholder="/공지">
            </label>
            <label>
              응답 내용
              <textarea data-command-response rows="4" placeholder="오늘 공지는 여기입니다."></textarea>
            </label>
            <button class="button button-secondary" type="button" data-add-command>명령어 추가/수정</button>
          </div>

          <div class="admin-actions">
            <button class="button button-primary" type="submit">방 설정 저장</button>
            <button class="button button-secondary" type="button" data-fill-selected>선택 방 불러오기</button>
          </div>
        </form>

        <section class="admin-result" aria-live="polite">
          <h2>신청/결제</h2>
          <div class="application-card-list" data-application-list></div>
          <h2>운영 상태</h2>
          <div class="room-card-list" data-room-list></div>
          <pre data-admin-output>운영 토큰을 입력하고 등록 방 불러오기를 누르세요.</pre>
        </section>
      </section>

      <section class="admin-import">
        <h2>백업 복구</h2>
        <p>관리 콘솔에서 받은 백업 JSON을 붙여넣고 복구할 수 있습니다. 운영 토큰이 필요합니다.</p>
        <textarea data-restore-json rows="8" placeholder='{"rooms":[...]}'></textarea>
        <button class="button button-secondary" type="button" data-restore>백업 복구 실행</button>
      </section>
    </main>

    <script>
      const tokenInput = document.querySelector("[data-token]");
      const saveTokenInput = document.querySelector("[data-save-token]");
      const form = document.querySelector("[data-admin-form]");
      const output = document.querySelector("[data-admin-output]");
      const roomList = document.querySelector("[data-room-list]");
      const applicationList = document.querySelector("[data-application-list]");
      const summary = document.querySelector("[data-summary]");
      const restoreInput = document.querySelector("[data-restore-json]");
      const searchInput = document.querySelector("[data-admin-search]");
      const commandTriggerInput = document.querySelector("[data-command-trigger]");
      const commandResponseInput = document.querySelector("[data-command-response]");
      let rooms = [];
      let applications = [];
      let selectedRoom = null;

      function token() {
        return tokenInput.value.trim();
      }

      function friendlyError(error) {
        const message = String(error?.message || error || "");
        if (message === "unauthorized") return "운영 토큰이 없거나 틀립니다. Vercel 환경변수 ADMIN_CONSOLE_TOKEN 값을 입력하세요.";
        if (message === "admin_console_token_not_configured") return "서버에 ADMIN_CONSOLE_TOKEN 환경변수가 설정되지 않았습니다.";
        return message;
      }

      function print(value) {
        output.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function searchTerm() {
        return String(searchInput.value || "").trim().toLowerCase();
      }

      function searchableText(...values) {
        return values.flat(Infinity).map((value) => String(value ?? "")).join(" ").toLowerCase();
      }

      function roomMatchesSearch(room, term) {
        if (!term) return true;
        return searchableText(
          room.name,
          room.roomIds,
          room.roomLinks,
          room.admins,
          room.licenseKey,
          room.joinPhrase,
          room.subscription?.status,
          room.gameSettings?.seasonName,
          room.gameSettings?.diceReward,
          room.gameSettings?.fishingReward,
          room.gameSettings?.exploreReward,
          room.diagnostics?.problems
        ).includes(term);
      }

      function applicationMatchesSearch(application, term) {
        if (!term) return true;
        return searchableText(
          application.roomName,
          application.email,
          application.adminName,
          application.contact,
          application.roomLink,
          application.status,
          application.statusLabel,
          application.payment?.status,
          application.payment?.statusLabel
        ).includes(term);
      }

      function rememberToken() {
        if (!saveTokenInput.checked) {
          localStorage.removeItem("pixgomAdminToken");
          return;
        }
        localStorage.setItem("pixgomAdminToken", token());
      }

      function featuresFromForm() {
        return {
          attendance: form.elements.feature_attendance.checked,
          points: form.elements.feature_points.checked,
          rankings: form.elements.feature_rankings.checked,
          history: form.elements.feature_history.checked,
          profiles: form.elements.feature_profiles.checked,
          localJs: form.elements.feature_localJs.checked,
          games: form.elements.feature_games.checked,
          customCommands: form.elements.feature_customCommands.checked
        };
      }

      function gameSettingsFromForm() {
        return {
          seasonName: form.elements.gameSeasonName.value.trim() || "픽셀곰 시즌 1",
          diceReward: Number(form.elements.gameDiceReward.value || 30),
          fishingReward: Number(form.elements.gameFishingReward.value || 40),
          exploreReward: Number(form.elements.gameExploreReward.value || 50)
        };
      }

      function customCommandsFromForm() {
        return form.elements.customCommands.value
          .split(/\n+/)
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => {
            const [trigger, ...responseParts] = line.split("=");
            return {
              trigger: trigger?.trim(),
              response: responseParts.join("=").trim()
            };
          })
          .filter((item) => item.trigger && item.response);
      }

      function customCommandsToText(commands = []) {
        return commands.map((item) => `${item.trigger}=${item.response}`).join("\n");
      }

      function normalizeCommandTrigger(value) {
        const body = String(value || "").trim().replace(/^\/+/, "").split(/\s+/)[0] || "";
        return body ? `/${body.replace(/[^\p{L}\p{N}_-]/gu, "").slice(0, 24)}` : "";
      }

      function upsertCommandLine(trigger, response) {
        const normalizedTrigger = normalizeCommandTrigger(trigger);
        const normalizedResponse = String(response || "").trim();
        if (!normalizedTrigger || !normalizedResponse) {
          print("명령어와 응답 내용을 모두 입력하세요.");
          return;
        }
        const commands = customCommandsFromForm().filter((item) => item.trigger !== normalizedTrigger);
        commands.push({ trigger: normalizedTrigger, response: normalizedResponse });
        form.elements.customCommands.value = customCommandsToText(commands);
        commandTriggerInput.value = "";
        commandResponseInput.value = "";
        print(`${normalizedTrigger} 커스텀 명령어를 편집 목록에 추가했습니다. 저장 버튼을 눌러 반영하세요.`);
      }

      function setFeatureForm(features = {}) {
        form.elements.feature_attendance.checked = features.attendance !== false;
        form.elements.feature_points.checked = features.points !== false;
        form.elements.feature_rankings.checked = features.rankings !== false;
        form.elements.feature_history.checked = features.history !== false;
        form.elements.feature_profiles.checked = features.profiles !== false;
        form.elements.feature_localJs.checked = features.localJs !== false;
        form.elements.feature_games.checked = features.games === true;
        form.elements.feature_customCommands.checked = features.customCommands !== false;
      }

      function setGameSettingsForm(settings = {}) {
        form.elements.gameSeasonName.value = settings.seasonName || "픽셀곰 시즌 1";
        form.elements.gameDiceReward.value = settings.diceReward ?? 30;
        form.elements.gameFishingReward.value = settings.fishingReward ?? 40;
        form.elements.gameExploreReward.value = settings.exploreReward ?? 50;
      }

      function fillForm(room) {
        if (!room) return;
        selectedRoom = room;
        form.elements.room.value = room.name || "";
        form.elements.roomId.value = room.roomIds?.[0] || "";
        form.elements.roomLink.value = room.roomLinks?.[0] || "";
        form.elements.joinPhrase.value = room.joinPhrase || "";
        form.elements.roomAdmins.value = (room.admins || []).join(",");
        form.elements.licenseKey.value = room.licenseKey || "";
        form.elements.monthlyPriceKrw.value = room.subscription?.monthlyPriceKrw || 5500;
        form.elements.subscriptionExpiresAt.value = room.subscription?.expiresAt ? room.subscription.expiresAt.slice(0, 10) : "";
        setFeatureForm(room.features || {});
        setGameSettingsForm(room.gameSettings || {});
        form.elements.customCommands.value = customCommandsToText(room.customCommands || []);
      }

      function renderSummary(data) {
        const values = [
          data.summary?.rooms ?? rooms.length,
          data.summary?.activeRooms ?? rooms.filter((room) => room.enabled).length,
          data.summary?.expiredRooms ?? rooms.filter((room) => room.subscription?.status === "expired").length
        ];
        summary.querySelectorAll("strong").forEach((item, index) => {
          item.textContent = values[index];
        });
      }

      function renderRooms(data) {
        if (Array.isArray(data.rooms)) rooms = data.rooms;
        const term = searchTerm();
        const visibleRooms = rooms.filter((room) => roomMatchesSearch(room, term));
        renderSummary({
          summary: {
            rooms: visibleRooms.length,
            activeRooms: visibleRooms.filter((room) => room.enabled && room.registered).length,
            expiredRooms: visibleRooms.filter((room) => room.subscription?.status === "expired").length
          }
        });
        roomList.innerHTML = "";
        if (!visibleRooms.length) {
          roomList.innerHTML = `<p>${term ? "검색 결과가 없습니다." : "등록된 방이 없습니다."}</p>`;
          return;
        }
        for (const room of visibleRooms) {
          const game = room.gameSettings || {};
          const roomIds = (room.roomIds || []).join(", ") || "-";
          const admins = (room.admins || []).join(", ") || "-";
          const problems = room.diagnostics?.ok ? "진단 정상" : (room.diagnostics?.problems || []).join(", ");
          const card = document.createElement("button");
          card.type = "button";
          card.className = "room-card";
          card.innerHTML = `
            <strong>${escapeHtml(room.name || "이름 없음")}</strong>
            <span>${room.enabled ? "활성" : "비활성"} · ${escapeHtml(room.subscription?.status || "미설정")} · ${room.subscription?.remainingDays ?? "-"}일</span>
            <small>roomId ${escapeHtml(roomIds)} · 관리자 ${escapeHtml(admins)}</small>
            <small>게임 ${room.features?.games ? "켜짐" : "꺼짐"} · ${escapeHtml(game.seasonName || "픽셀곰 시즌 1")} · 주사위 ${game.diceReward ?? 30} / 낚시 ${game.fishingReward ?? 40} / 탐험 ${game.exploreReward ?? 50}</small>
            <small>${escapeHtml(problems || "진단 확인 필요")}</small>
          `;
          card.addEventListener("click", () => fillForm(room));
          roomList.appendChild(card);
        }
      }

      function renderApplications(data) {
        if (Array.isArray(data.applications)) applications = data.applications;
        const term = searchTerm();
        const visibleApplications = applications.filter((application) => applicationMatchesSearch(application, term));
        applicationList.innerHTML = "";
        if (!visibleApplications.length) {
          applicationList.innerHTML = `<p>${term ? "검색 결과가 없습니다." : "신청 내역이 없습니다."}</p>`;
          return;
        }
        for (const application of visibleApplications) {
          const card = document.createElement("article");
          card.className = "application-card";
          card.innerHTML = `
            <div>
              <strong>${escapeHtml(application.roomName || "방 이름 없음")}</strong>
              <span>${escapeHtml(application.email)} · ${escapeHtml(application.statusLabel)} · ${escapeHtml(application.payment?.statusLabel || "결제 미확인")}</span>
              <small>${escapeHtml(application.adminName || "")} · ${escapeHtml(application.roomLink || "")}</small>
            </div>
            <button class="button button-secondary" type="button" ${application.status === "approved" ? "disabled" : ""}>입금 승인</button>
          `;
          card.querySelector("button").addEventListener("click", () => approveApplication(application.id));
          applicationList.appendChild(card);
        }
      }

      async function requestJson(path, options = {}) {
        const response = await fetch(path, options);
        const json = await response.json();
        if (!response.ok || json.ok === false) throw new Error(json.error || response.statusText);
        return json;
      }

      async function loadRooms() {
        rememberToken();
        const json = await requestJson(`/api/admin/rooms?token=${encodeURIComponent(token())}`);
        renderRooms(json);
        print(json);
      }

      async function loadApplications() {
        rememberToken();
        const json = await requestJson(`/api/admin/applications?token=${encodeURIComponent(token())}`);
        renderApplications(json);
        print(json);
      }

      async function approveApplication(applicationId) {
        try {
          rememberToken();
          const json = await requestJson("/api/admin/applications/approve", {
            method: "POST",
            headers: { "content-type": "application/json", "x-admin-token": token() },
            body: JSON.stringify({ applicationId, months: 1 })
          });
          print(json);
          await loadApplications();
          await loadRooms();
        } catch (error) {
          print(friendlyError(error));
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          rememberToken();
          const data = Object.fromEntries(new FormData(form).entries());
          data.roomAdmins = data.roomAdmins.split(",").map((item) => item.trim()).filter(Boolean);
          data.monthlyPriceKrw = Number(data.monthlyPriceKrw || 5500);
          data.features = featuresFromForm();
          data.gameSettings = gameSettingsFromForm();
          data.customCommands = customCommandsFromForm();
          const json = await requestJson("/api/admin/rooms", {
            method: "POST",
            headers: { "content-type": "application/json", "x-admin-token": token() },
            body: JSON.stringify(data)
          });
          print(json);
          await loadRooms();
        } catch (error) {
          print(friendlyError(error));
        }
      });

      document.querySelector("[data-load-rooms]").addEventListener("click", () => {
        loadRooms().catch((error) => print(friendlyError(error)));
      });

      document.querySelector("[data-load-applications]").addEventListener("click", () => {
        loadApplications().catch((error) => print(friendlyError(error)));
      });

      document.querySelector("[data-add-command]").addEventListener("click", () => {
        upsertCommandLine(commandTriggerInput.value, commandResponseInput.value);
      });

      searchInput.addEventListener("input", () => {
        renderRooms({ rooms });
        renderApplications({ applications });
      });

      document.querySelector("[data-diagnostics]").addEventListener("click", async () => {
        try {
          print(await requestJson(`/api/admin/diagnostics?token=${encodeURIComponent(token())}`));
        } catch (error) {
          print(friendlyError(error));
        }
      });

      document.querySelector("[data-backup]").addEventListener("click", async () => {
        try {
          const json = await requestJson(`/api/admin/backup?token=${encodeURIComponent(token())}`);
          restoreInput.value = JSON.stringify(json, null, 2);
          print("백업 JSON을 아래 복구 입력칸에 준비했습니다.");
        } catch (error) {
          print(friendlyError(error));
        }
      });

      document.querySelector("[data-restore]").addEventListener("click", async () => {
        try {
          const payload = JSON.parse(restoreInput.value);
          payload.token = token();
          print(await requestJson("/api/admin/restore", {
            method: "POST",
            headers: { "content-type": "application/json", "x-admin-token": token() },
            body: JSON.stringify(payload)
          }));
          await loadRooms();
        } catch (error) {
          print(friendlyError(error));
        }
      });

      document.querySelector("[data-fill-selected]").addEventListener("click", () => {
        fillForm(selectedRoom || rooms[0]);
      });

      const savedAdminToken = localStorage.getItem("pixgomAdminToken");
      if (savedAdminToken) {
        tokenInput.value = savedAdminToken;
        saveTokenInput.checked = true;
        print("저장된 운영 토큰을 불러왔습니다. 신청/결제 불러오기를 누르세요.");
      }
    </script>
  </body>
</html>
