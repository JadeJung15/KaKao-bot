<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입 | 픽셀곰</title>
    <link rel="icon" href="/assets/pixgom-closeup.png" type="image/png">
    <link rel="stylesheet" href="/styles.css?v=20260525-silent-auth">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="auth-page auth-checking">
    <main class="auth-shell">
      <a class="brand auth-brand" href="/"><img src="/assets/pixgom-closeup.png" alt=""><span>픽셀곰</span></a>
      <section class="auth-card">
        <p class="section-kicker">Account</p>
        <h1>회원가입</h1>
        <p>구매자 계정을 만든 뒤 이메일 인증을 완료하면 서비스 신청으로 이동할 수 있습니다.</p>
        <small data-auth-mode>로그인 방식을 확인 중입니다.</small>
        <div class="start-journey" aria-label="처음 시작 5단계">
          <strong>처음 시작 5단계</strong>
          <ol>
            <li class="is-active"><span>1</span>계정 만들기</li>
            <li><span>2</span>서비스 신청</li>
            <li><span>3</span>운영자 승인</li>
            <li><span>4</span>앱 연결</li>
            <li><span>5</span>첫 명령어 설치</li>
          </ol>
        </div>
        <form data-signup-form>
          <label>닉네임<input name="nickname" type="text" autocomplete="nickname" required maxlength="40" placeholder="콘솔에 표시될 이름"></label>
          <label>이메일<input name="email" type="email" autocomplete="email" required placeholder="pixelgom@example.com"></label>
          <label>비밀번호<input name="password" type="password" autocomplete="new-password" required minlength="8" placeholder="8자 이상"></label>
          <label>비밀번호 확인<input name="passwordConfirm" type="password" autocomplete="new-password" required minlength="8" placeholder="비밀번호 다시 입력"></label>
          <div class="consent-list" aria-label="약관 동의">
            <label class="check-row">
              <input name="termsAgreed" type="checkbox" required>
              <span><strong>필수</strong> <a href="/terms" target="_blank" rel="noopener">서비스 이용약관</a>에 동의합니다.</span>
            </label>
            <label class="check-row">
              <input name="privacyAgreed" type="checkbox" required>
              <span><strong>필수</strong> <a href="/privacy" target="_blank" rel="noopener">개인정보처리방침</a>에 동의합니다.</span>
            </label>
            <label class="check-row">
              <input name="marketingAgreed" type="checkbox">
              <span><strong>선택</strong> 업데이트/이벤트 안내 수신에 동의합니다.</span>
            </label>
          </div>
          <button class="button button-primary" type="submit">계정 만들기</button>
          <button class="button kakao-button" type="button" data-kakao-login hidden>카카오로 시작</button>
        </form>
        <pre class="form-status" data-signup-result aria-live="polite"></pre>
        <div class="auth-links">
          <a href="/apply">이미 계정이 있으면 서비스 신청</a>
          <a href="/login">로그인</a>
          <a href="/forgot-password">비밀번호 찾기</a>
        </div>
      </section>
    </main>
    <script src="/auth.js?v=20260525-silent-auth"></script>
    <script>
      const form = document.querySelector("[data-signup-form]");
      const result = document.querySelector("[data-signup-result]");
      const kakaoButton = document.querySelector("[data-kakao-login]");
      const authGate = window.PixelgomAuth.createSilentGate({ status: result });

      function showSignupForm(message = "가입 정보를 입력하면 인증 메일을 발송합니다.") {
        authGate.finish(message);
      }

      async function registerServerAccount(payload) {
        const response = await fetch("/api/signup", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        const json = await response.json();
        if (!response.ok || json.ok === false) throw new Error(json.error || "signup_failed");
        if (json.guideToken) sessionStorage.setItem("pixgomBuyerToken", json.guideToken);
        return json;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        result.textContent = "계정을 만드는 중입니다.";
        const payload = Object.fromEntries(new FormData(form).entries());
        if (!payload.nickname?.trim()) {
          result.textContent = `회원가입 실패: ${window.PixelgomAuth.friendlyError("nickname_required")}`;
          return;
        }
        if (payload.password !== payload.passwordConfirm) {
          result.textContent = `회원가입 실패: ${window.PixelgomAuth.friendlyError("password_mismatch")}`;
          return;
        }
        if (!payload.termsAgreed || !payload.privacyAgreed) {
          result.textContent = `회원가입 실패: ${window.PixelgomAuth.friendlyError("terms_required")}`;
          return;
        }
        try {
          const signupResult = await window.PixelgomAuth.signUpWithPassword(payload.email, payload.password, { nickname: payload.nickname });
          const authPayload = signupResult.local ? payload : await window.PixelgomAuth.accessPayload(payload);
          if (!authPayload.accessToken && !signupResult.local) {
            sessionStorage.setItem("pixgomSignupEmail", payload.email || "");
            sessionStorage.setItem("pixgomSignupNickname", payload.nickname || "");
            result.textContent = [
              "인증 메일을 발송했습니다.",
              "",
              "메일함에서 '이메일 인증하기' 버튼을 눌러 가입을 완료해 주세요.",
              "인증 후 로그인하면 서비스 신청을 이어갈 수 있습니다."
            ].join("\n");
            return;
          }
          const json = await registerServerAccount(authPayload);
          sessionStorage.setItem("pixgomSignupEmail", payload.email || "");
          result.textContent = [
            json.created ? "회원가입이 완료되었습니다." : "이미 가입된 계정입니다.",
            `닉네임: ${json.account.nickname || payload.nickname}`,
            `계정: ${json.account.email || json.account.authProvider || "카카오 계정"}`,
            "",
            ...json.next,
            "",
            "다음: /apply 에서 방 정보를 신청하세요."
          ].join("\n");
          setTimeout(() => {
            window.location.href = "/apply";
          }, 900);
        } catch (error) {
          result.textContent = `회원가입 실패: ${window.PixelgomAuth.friendlyError(error)}`;
        }
      });

      kakaoButton.addEventListener("click", async () => {
        result.textContent = "카카오 로그인으로 이동합니다.";
        try {
          const payload = Object.fromEntries(new FormData(form).entries());
          if (!payload.termsAgreed || !payload.privacyAgreed) {
            result.textContent = `카카오 가입 실패: ${window.PixelgomAuth.friendlyError("terms_required")}`;
            return;
          }
          sessionStorage.setItem("pixgomSignupConsent", JSON.stringify({
            nickname: payload.nickname || "",
            termsAgreed: true,
            privacyAgreed: true,
            marketingAgreed: Boolean(payload.marketingAgreed)
          }));
          await window.PixelgomAuth.signInWithKakao("/signup");
        } catch (error) {
          result.textContent = `카카오 로그인 실패: ${window.PixelgomAuth.friendlyError(error)}`;
        }
      });

      (async () => {
        const storedBuyerToken = sessionStorage.getItem("pixgomBuyerToken");
        const storedOwnerToken = sessionStorage.getItem("pixgomOwnerToken");
        if (storedOwnerToken) {
          window.location.href = "/admin";
          return;
        }
        if (storedBuyerToken) {
          window.location.href = "/console";
          return;
        }
        if (!authGate.hasHint) showSignupForm();
        const cfg = await window.PixelgomAuth.config();
        window.PixelgomAuth.showAuthMode(document.querySelector("[data-auth-mode]"), cfg);
        kakaoButton.hidden = !cfg.auth?.kakaoEnabled;
        const authPayload = await window.PixelgomAuth.accessPayload({});
        if (authPayload.accessToken) {
          result.textContent = "소셜 계정을 연결 중입니다.";
          const storedConsent = JSON.parse(sessionStorage.getItem("pixgomSignupConsent") || "{}");
          const fallbackNickname = sessionStorage.getItem("pixgomSignupNickname") || "";
          if (fallbackNickname && !storedConsent.nickname) storedConsent.nickname = fallbackNickname;
          registerServerAccount({ ...storedConsent, ...authPayload })
            .then(() => {
              result.textContent = "계정 연결이 완료되었습니다. 서비스 신청으로 이동합니다.";
              setTimeout(() => { window.location.href = "/apply"; }, 700);
            })
            .catch((error) => showSignupForm(`계정 연결 실패: ${window.PixelgomAuth.friendlyError(error)}`));
          return;
        }
        showSignupForm();
      })();
    </script>
  </body>
</html>
