<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>픽셀곰 이메일 인증</title>
  </head>
  <body style="margin:0;background:#fff8ec;color:#2b251f;font-family:Arial,'Malgun Gothic',sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#fff8ec;padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #eadbc8;border-radius:16px;overflow:hidden;">
            <tr>
              <td style="padding:28px 28px 18px;text-align:center;background:#fdf4e4;">
                <img src="https://pixgom.com/assets/pixgom-closeup.png" width="88" height="88" alt="픽셀곰" style="display:block;margin:0 auto 14px;border-radius:18px;border:2px solid #2b251f;">
                <div style="font-size:14px;font-weight:700;color:#3e806a;letter-spacing:0.08em;">PIXELGOM</div>
                <h1 style="margin:10px 0 0;font-size:28px;line-height:1.25;">이메일 인증을 완료해주세요.</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:30px 28px;">
                <p style="margin:0 0 14px;font-size:16px;line-height:1.7;">픽셀곰 서비스 이용을 위해 이메일 확인이 필요합니다.</p>
                <p style="margin:0 0 24px;font-size:16px;line-height:1.7;">아래 버튼을 클릭하여 가입을 완료해 주세요.</p>
                <p style="text-align:center;margin:0 0 26px;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;min-width:190px;padding:14px 20px;background:#3e806a;color:#ffffff;text-decoration:none;border-radius:10px;font-weight:800;font-size:16px;">이메일 인증하기</a>
                </p>
                <ul style="margin:0 0 24px;padding-left:20px;color:#675c51;font-size:14px;line-height:1.8;">
                  <li>본 인증 링크는 발급 후 24시간 동안 유효합니다.</li>
                  <li>본인이 가입한 적이 없다면 메일을 무시해 주세요.</li>
                </ul>
                <p style="margin:0;padding-top:18px;border-top:1px solid #eadbc8;color:#8a7b6b;font-size:13px;line-height:1.6;">본 메일은 발신 전용입니다. 문의는 픽셀곰 오픈채팅 또는 구매자 콘솔을 이용해 주세요.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
